name: Auto-Enhance Mission Control

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  analyze-and-enhance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run code analysis
        id: analysis
        run: |
          echo "Analyzing codebase for enhancement opportunities..."
          
          # Count files by type
          TS_FILES=$(find src -name "*.ts" -o -name "*.tsx" | wc -l)
          CSS_FILES=$(find src -name "*.css" -o -name "*.scss" | wc -l)
          TEST_FILES=$(find src -name "*.test.*" -o -name "*.spec.*" | wc -l)
          
          echo "ts_files=$TS_FILES" >> $GITHUB_OUTPUT
          echo "css_files=$CSS_FILES" >> $GITHUB_OUTPUT
          echo "test_files=$TEST_FILES" >> $GITHUB_OUTPUT
          
          # Check for lint errors
          npm run lint 2>/dev/null || true
          
          # Check for TypeScript errors
          npx tsc --noEmit 2>/dev/null || true

      - name: Determine enhancement focus
        id: focus
        run: |
          # Read enhancement goals
          if [ -f ENHANCEMENT_GOALS.md ]; then
            echo "Using ENHANCEMENT_GOALS.md for guidance"
          fi
          
          # Determine current hour to cycle through enhancement types
          HOUR=$(date +%H)
          case $((HOUR / 3 % 5)) in
            0)
              echo "focus=code_quality" >> $GITHUB_OUTPUT
              echo "title=Code Quality & Refactoring" >> $GITHUB_OUTPUT
              ;;
            1)
              echo "focus=performance" >> $GITHUB_OUTPUT
              echo "title=Performance Optimization" >> $GITHUB_OUTPUT
              ;;
            2)
              echo "focus=ui_ux" >> $GITHUB_OUTPUT
              echo "title=UI/UX Enhancement" >> $GITHUB_OUTPUT
              ;;
            3)
              echo "focus=testing" >> $GITHUB_OUTPUT
              echo "title=Test Coverage Improvement" >> $GITHUB_OUTPUT
              ;;
            4)
              echo "focus=documentation" >> $GITHUB_OUTPUT
              echo "title=Documentation Update" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Create enhancement issue
        uses: actions/github-script@v7
        with:
          script: |
            const focus = '${{ steps.focus.outputs.focus }}';
            const title = '${{ steps.focus.outputs.title }}';
            const tsFiles = '${{ steps.analysis.outputs.ts_files }}';
            const testFiles = '${{ steps.analysis.outputs.test_files }}';
            
            const body = `## 🚀 Automated Enhancement: ${title}
            
            **Scheduled Run:** ${new Date().toISOString()}
            **Focus Area:** ${focus}
            **Trigger:** Every 3 hours automated enhancement cycle
            
            ### Current Codebase Stats
            - TypeScript/TSX Files: ${tsFiles}
            - Test Files: ${testFiles}
            - Last Commit: ${context.sha.substring(0, 7)}
            
            ### Enhancement Goals
            ${focus === 'code_quality' ? `- [ ] Review and refactor complex components
            - [ ] Fix any ESLint/TypeScript warnings
            - [ ] Improve code organization and modularity
            - [ ] Remove unused code and dependencies` : 
            focus === 'performance' ? `- [ ] Optimize React renders and re-renders
            - [ ] Check for memory leaks
            - [ ] Optimize bundle size
            - [ ] Review and optimize API calls` :
            focus === 'ui_ux' ? `- [ ] Improve visual consistency
            - [ ] Enhance responsive design
            - [ ] Add micro-interactions and animations
            - [ ] Accessibility improvements (a11y)` :
            focus === 'testing' ? `- [ ] Add unit tests for uncovered code
            - [ ] Add integration tests
            - [ ] Improve test coverage
            - [ ] Add e2e tests for critical paths` :
            `- [ ] Update README and documentation
            - [ ] Add inline code comments
            - [ ] Update AGENTS.md with new patterns
            - [ ] Create/Update API documentation`}
            
            ### Notes
            This issue was automatically generated by the Auto-Enhance workflow.
            The enhancement cycle rotates through: Code Quality → Performance → UI/UX → Testing → Documentation
            
            ---
            *Triggered by: .github/workflows/auto-enhance.yml*`;
            
            // Create the issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] ${title} - ${new Date().toLocaleDateString()}`,
              body: body,
              labels: ['auto-enhance', focus, 'enhancement']
            });
            
            console.log(`Created issue #${issue.number}: ${issue.title}`);
            
            // Return the issue number for next step
            return issue.number;

      - name: Assign to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.create-issue.outputs.result }};
            
            // Use GitHub API to assign Copilot to the issue
            // This requires the Copilot Coding Agent to be enabled
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: ['github-copilot']
              });
              console.log(`Assigned Copilot to issue #${issueNumber}`);
            } catch (error) {
              console.log('Note: Could not auto-assign Copilot. Manual assignment may be needed.');
            }

  create-enhancement-pr:
    runs-on: ubuntu-latest
    needs: analyze-and-enhance
    if: github.event_name == 'workflow_dispatch' || github.run_number % 3 == 0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run automated fixes
        run: |
          # Run lint --fix if available
          npm run lint -- --fix 2>/dev/null || true
          
          # Run prettier if configured
          npx prettier --write "src/**/*.{ts,tsx,css}" 2>/dev/null || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated code enhancements"
          title: "[AUTO] Routine Code Enhancements"
          body: |
            ## Automated Enhancements
            
            This PR contains automated code improvements generated by the enhancement workflow.
            
            ### Changes may include:
            - Code formatting (Prettier)
            - Lint fixes
            - Minor refactoring
            - Documentation updates
            
            ### Review Checklist
            - [ ] Changes look correct
            - [ ] No functional regressions
            - [ ] Tests still pass
            
            ---
            *Auto-generated by .github/workflows/auto-enhance.yml*
          branch: auto/enhance-${{ github.run_number }}
          delete-branch: true
          labels: auto-enhance, automated
